<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonRushGame | Официальный сайт</title>
    <style>
        /* Весь CSS теперь здесь */
        :root {
            --main-bg: #0b161d;
            --card-bg: #111e27;
            --btn-blue: #00a1ff;
            --accent: #00d4ff;
            --text-gray: #8ea1ad;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--main-bg); color: #fff; line-height: 1.6; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        header { background: #0d1b26; padding: 15px 0; border-bottom: 1px solid #1c2e3a; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: bold; font-size: 24px; }
        .logo span { color: var(--accent); }

        .main-layout { display: grid; grid-template-columns: 1fr 300px; gap: 40px; padding: 30px 0; }

        .game-info h1 { font-size: 40px; margin-bottom: 5px; }
        .dev-name span { color: var(--accent); font-weight: bold; }
        .stats { color: var(--text-gray); font-size: 14px; }

        .btn-download { 
            display: block; 
            background: var(--btn-blue); 
            color: #fff; 
            text-decoration: none; 
            padding: 25px; 
            border-radius: 15px; 
            margin: 30px 0; 
            transition: 0.3s;
        }
        .btn-download:hover { transform: translateY(-3px); background: #008be0; }
        .dl-text { font-size: 22px; font-weight: bold; }
        .dl-version { font-size: 13px; opacity: 0.8; }

        .screenshots-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0 40px 0;
        }
        .screenshots-grid img {
            width: 100%;
            border-radius: 12px;
            border: 2px solid #1c2e3a;
        }

        .comments-section { background: var(--card-bg); padding: 30px; border-radius: 15px; }
        .comment { background: #1c2e3a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .comment-form { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .comment-form input, .comment-form textarea { background: #0b161d; border: 1px solid #1c2e3a; color: #fff; padding: 12px; border-radius: 8px; }
        .comment-form button { background: var(--accent); border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 8px; color: #0b161d; }

        .sidebar h3 { font-size: 18px; margin-bottom: 20px; color: var(--text-gray); }
        .side-card { display: flex; gap: 15px; background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 15px; align-items: center; }
        .side-img { width: 45px; height: 45px; background: #1c2e3a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        footer { text-align: center; padding: 50px 0; color: #444; border-top: 1px solid #1c2e3a; margin-top: 40px; }

        @media (max-width: 800px) {
            .main-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .screenshots-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">MOON<span>GAME</span></div>
        </div>
    </header>

    <div class="main-layout container">
        <main>
            <div class="game-header">
                <h1>MoonRushGame</h1>
                <p class="dev-name">Разработчик: <span>MoonEngine</span></p>
                <div class="stats">⭐ 5.0 | RPG Survival | 26 MB</div>
            </div>

            <a href="MoonRush.zip" class="btn-download" download>
                <div class="dl-text">Скачать последнюю версию</div>
                <div class="dl-version">v1.0.4 | Windows EXE | 2026</div>
            </a>

            <section>
                <h2>Галерея скриншотов</h2>
                <div class="screenshots-grid">
                    <img src="img/Screen1.png" alt="Screen 1">
                    <img src="img/Screen2.png" alt="Screen 2">
                    <img src="img/Screen3.png" alt="Screen 3">
                    <img src="img/Screen4.png" alt="Screen 4">
                </div>
            </section>

            <section class="comments-section">
                <h2>Комментарии</h2>
                <div id="comments-display"></div>
                <div class="comment-form">
                    <input type="text" id="user-name" placeholder="Ваше имя">
                    <textarea id="comment-text" rows="3" placeholder="Ваш отзыв..."></textarea>
                    <button onclick="addComment()">Отправить</button>
                </div>
            </section>
        </main>

        <aside class="sidebar">
            <h3>Похожие проекты</h3>
            <div class="side-card"><div class="side-img">🌑</div><div>Dark Moon<br><small>RPG</small></div></div>
            <div class="side-card"><div class="side-img">☄️</div><div>Star Hunter<br><small>Action</small></div></div>
            <div class="side-card"><div class="side-img">🛸</div><div>Void Walker<br><small>Survival</small></div></div>
        </aside>
    </div>

    <footer>
        <p>&copy; 2026 MoonGame Studio. Разработано <strong>MoonEngine</strong>.</p>
    </footer>

    <script>
        // Скрипт комментариев тоже здесь
        const commentsList = document.getElementById('comments-display');

        function loadComments() {
            const saved = localStorage.getItem('moonGameComments');
            if (saved) commentsList.innerHTML = saved;
        }

        function addComment() {
            const name = document.getElementById('user-name').value;
            const text = document.getElementById('comment-text').value;
            if (name && text) {
                const html = `<div class="comment"><strong>${name}:</strong><p>${text}</p></div>`;
                commentsList.innerHTML += html;
                localStorage.setItem('moonGameComments', commentsList.innerHTML);
                document.getElementById('user-name').value = '';
                document.getElementById('comment-text').value = '';
            }
        }
        window.onload = loadComments;
    </script>
</body>
</html>
